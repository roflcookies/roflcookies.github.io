<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <script src="header-component.js" type="text/javascript" defer></script>
    <script src="footer-component.js" type="text/javascript" defer></script>

    <style>
        .dark-drive-embed {
            width: 100%;

			<iframe		
				src="https://youtube.com/embed/live_stream?channel=UC0zcoCgOcBD-ysQFKfRTeIw" 
				frameborder="0"
				height="360"
				allowfullscreen 
				referrerPolicy="strict-origin-when-cross-origin">

        <main-footer></main-footer>

</html>
